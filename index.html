<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORGANVM: META-ORGANVM</title>
    <style>
        :root { --primary: #0366d6; --bg: #f6f8fa; --text: #24292e; --border: #e1e4e8; --sidebar-bg: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: var(--text); margin: 0; display: flex; min-height: 100vh; background: var(--bg); }
        
        /* Sidebar Styles */
        nav { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 2rem 1.5rem; flex-shrink: 0; position: sticky; top: 0; height: 100vh; box-sizing: border-box; }
        nav h2 { font-size: 0.75rem; color: #6a737d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1.5rem; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { margin-bottom: 0.5rem; }
        nav a { text-decoration: none; color: #586069; font-size: 0.9rem; padding: 0.5rem 0.75rem; border-radius: 6px; display: block; transition: all 0.2s; }
        nav a:hover { background: #f1f8ff; color: var(--primary); }
        nav a.active { background: #f1f8ff; color: var(--primary); font-weight: 600; border-left: 3px solid var(--primary); border-radius: 0 6px 6px 0; }

        /* Main Content Styles */
        main { flex-grow: 1; padding: 3rem 4rem; max-width: 1200px; }
        header { margin-bottom: 3rem; }
        header h1 { font-size: 2rem; font-weight: 800; margin: 0; color: #000; }
        header p { color: #6a737d; font-size: 1.1rem; margin-top: 0.5rem; }

        .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .repo-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); display: flex; flex-direction: column; text-decoration: none; color: inherit; }
        .repo-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        .repo-name { color: var(--primary); font-size: 1.25rem; font-weight: 700; margin-bottom: 0.75rem; word-break: break-all; }
        .repo-desc { font-size: 0.95rem; color: #586069; line-height: 1.5; margin-bottom: 1.5rem; flex-grow: 1; }
        .repo-footer { display: flex; align-items: center; justify-content: space-between; }
        .tag { font-size: 0.7rem; background: #eff7ff; color: var(--primary); padding: 4px 10px; border-radius: 20px; font-weight: 600; text-transform: uppercase; border: 1px solid #c8e1ff; }

        @media (max-width: 900px) { body { flex-direction: column; } nav { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); } main { padding: 2rem; } }
    </style>
</head>
